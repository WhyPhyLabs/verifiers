name: Test

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov nest-asyncio
    
    - name: Run unit tests (non-BFCL)
      run: |
        python -m pytest tests/ -v --cov=verifiers --cov-report=xml --cov-report=term -m "not bfcl_e2e"
    
  test-bfcl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-bfcl-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-bfcl-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install BFCL dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[bfcl]'
        pip install -e environments/vf_bfcl
        pip install pytest pytest-asyncio pytest-cov nest-asyncio
    
    - name: Test BFCL environment import
      run: |
        python -c "import vf_bfcl; print('BFCL environment imported successfully')"
    
    - name: Run BFCL tests
      run: |
        python -m pytest tests/ -k "bfcl" -v --cov=verifiers --cov-report=xml --cov-report=term
    
    - name: Run BFCL E2E tests
      run: |
        python -m pytest tests/ -m "bfcl_e2e" -v --cov=verifiers --cov-report=xml --cov-report=term